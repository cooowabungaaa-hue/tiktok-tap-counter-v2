<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live - Dashboard Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --card-bg: #18181b;
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --tiktok-cyan: #25F4EE;
            --tiktok-magenta: #FE2C55;
            --gold: #FFD700;
            --silver: #E2E2E2;
            --bronze: #CD7F32;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--tiktok-magenta);
            filter: drop-shadow(0 0 8px var(--tiktok-magenta));
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Ranking Container */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 24px;
            overflow: hidden;
        }

        .ranking-card {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .user-card {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .rank {
            font-size: 16px;
            font-weight: 800;
            width: 32px;
            color: var(--text-sub);
        }

        .user-list-item:nth-child(1) .rank {
            color: var(--gold);
        }

        .user-list-item:nth-child(2) .rank {
            color: var(--silver);
        }

        .user-list-item:nth-child(3) .rank {
            color: var(--bronze);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #333;
            margin-right: 14px;
            object-fit: cover;
            border: 1.5px solid transparent;
        }

        .user-list-item:nth-child(1) .avatar {
            border-color: var(--gold);
        }

        .user-info {
            flex-grow: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
        }

        .user-id {
            font-size: 11px;
            color: var(--text-sub);
            margin: 0;
        }

        .tap-count {
            font-size: 18px;
            font-weight: 800;
            color: var(--tiktok-cyan);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tap-icon {
            color: var(--tiktok-magenta);
            font-size: 14px;
        }

        /* Buttons & Modals */
        .btn {
            background: var(--tiktok-magenta);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--glass-border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        /* Animations */
        .update-flash {
            animation: flash 0.8s ease-out;
        }

        @keyframes flash {
            0% {
                background: rgba(254, 44, 85, 0.15);
            }

            100% {
                background: transparent;
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="logo"><span>❤</span> Tap Ranking</div>
        <div class="nav-actions">
            <div id="connection-status" class="status-badge">
                <div class="pulse"></div>
                Checking...
            </div>
            <button class="btn btn-outline" id="open-settings">⚙ 設定</button>
            <button class="btn btn-outline" id="shutdown-btn"
                style="color: var(--tiktok-magenta); border-color: rgba(254, 44, 85, 0.3);">🛑 終了</button>
        </div>
    </div>

    <div class="main-container">
        <div class="ranking-card">
            <div class="panel-header">
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <h3 style="margin:0;">🏆 Tap Ranking</h3>
                    <span id="rank-count" style="font-size: 11px; color: var(--text-sub);">0 Viewers Tracked</span>
                </div>
                <button class="btn btn-outline" id="copy-csv" style="padding: 6px 12px; font-size: 11px;">
                    📋 CSVコピー
                </button>
            </div>
            <ul class="ranking-list" id="ranking-container">
                <!-- Ranking items will be injected here -->
            </ul>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 style="margin-top: 0;">⚙ ツール設定</h2>
            <div class="form-group">
                <label>TikTok ユーザーID (@なし)</label>
                <input type="text" id="tiktok-id-input" placeholder="example_account">
            </div>
            <div class="form-group">
                <label>Google Sheets App Script URL (任意)</label>
                <input type="text" id="gs-url-input" placeholder="https://script.google.com/macros/s/...">
            </div>
            <button class="btn" id="save-settings" style="width: 100%;">設定を保存して再起動</button>
            <button class="btn btn-outline" id="close-settings"
                style="width: 100%; margin-top: 10px; border:none;">キャンセル</button>
        </div>
    </div>

    <script>
        const socket = io();
        const container = document.getElementById('ranking-container');
        const statusEl = document.getElementById('connection-status');
        const modal = document.getElementById('modal-overlay');
        const rankCountEl = document.getElementById('rank-count');

        const tiktokInput = document.getElementById('tiktok-id-input');
        const gsInput = document.getElementById('gs-url-input');

        let currentTiktokId = '';

        // 初期設定の取得
        function updateConfig() {
            fetch('/api/config')
                .then(res => res.json())
                .then(config => {
                    tiktokInput.value = config.tiktokUsername;
                    gsInput.value = config.googleSheetUrl;
                    currentTiktokId = config.tiktokUsername;
                });
        }
        updateConfig();

        socket.on('statusUpdate', (data) => {
            const color = data.connected ? 'var(--tiktok-cyan)' : 'var(--tiktok-magenta)';
            const pulse = statusEl.querySelector('.pulse');
            pulse.style.backgroundColor = color;
            pulse.style.boxShadow = `0 0 10px ${color}`;
            statusEl.childNodes[2].textContent = data.msg;
        });

        let prevRanking = {};

        socket.on('rankingUpdate', (ranking) => {
            currentRankingData = ranking; // 保存用にデータを保持
            renderRanking(ranking);
            rankCountEl.textContent = `${ranking.length} Viewers Tracked`;
        });

        let currentRankingData = [];

        // CSVコピー機能 (実際にはタブ区切りで、スプレッドシートへの貼り付けを最適化)
        document.getElementById('copy-csv').onclick = () => {
            if (currentRankingData.length === 0) {
                alert('データがありません。');
                return;
            }

            // タブ区切り (\t) にすることで、スプレッドシートにそのまま貼り付けて列が分かれるようになります
            let tsvContent = "順位\tユーザー名\tユーザーID\tタップ数\n";
            currentRankingData.forEach((user, index) => {
                tsvContent += `${index + 1}\t"${user.name}"\t"${user.id}"\t${user.taps}\n`;
            });

            navigator.clipboard.writeText(tsvContent).then(() => {
                const btn = document.getElementById('copy-csv');
                const originalText = btn.innerText;
                btn.innerText = '✅ コピー完了！';
                btn.style.borderColor = 'var(--tiktok-cyan)';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.borderColor = 'var(--glass-border)';
                }, 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
                alert('コピーに失敗しました。');
            });
        };

        function renderRanking(viewers) {
            container.innerHTML = '';
            viewers.forEach((viewer, index) => {
                const li = document.createElement('li');
                li.className = 'user-card user-list-item';

                if (prevRanking[viewer.id] && prevRanking[viewer.id] < viewer.taps) {
                    li.classList.add('update-flash');
                }

                li.innerHTML = `
                    <div class="rank">${index + 1}</div>
                    <img src="${viewer.avatar}" alt="avatar" class="avatar">
                    <div class="user-info">
                        <p class="user-name">${viewer.name}</p>
                        <p class="user-id">${viewer.id}</p>
                    </div>
                    <div class="tap-count">
                        <span class="tap-icon">❤</span> ${viewer.taps.toLocaleString()}
                    </div>
                `;
                container.appendChild(li);
                prevRanking[viewer.id] = viewer.taps;
            });
        }

        // Modal Controls
        document.getElementById('open-settings').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-settings').onclick = () => modal.style.display = 'none';

        document.getElementById('save-settings').onclick = async () => {
            const config = {
                tiktokUsername: tiktokInput.value.trim().replace('@', ''),
                googleSheetUrl: gsInput.value.trim()
            };

            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });

            if (res.ok) {
                currentTiktokId = config.tiktokUsername;
                modal.style.display = 'none';
            }
        };
        // Shutdown Tool
        document.getElementById('shutdown-btn').onclick = async () => {
            if (!confirm('ツールを完全に終了してもよろしいですか？')) return;

            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                if (res.ok) {
                    document.body.innerHTML = `
                        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#000; color:#fff;">
                            <h1 style="color:var(--tiktok-magenta)">🛑 ツールを終了しています...</h1>
                            <p>この画面（ブラウザ）を閉じてください。</p>
                        </div>
                    `;
                    // window.close() はユーザー操作で開いた窓でないと動かないことが多いが試みる
                    setTimeout(() => { window.close(); }, 2000);
                }
            } catch (err) {
                console.error('Logout failed:', err);
                alert('終了処理に失敗しました。黒い画面を直接閉じてください。');
            }
        };
    </script>
</body>

</html>
