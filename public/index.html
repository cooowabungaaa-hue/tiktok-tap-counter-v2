<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live - Tap Ranking Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1f1f23;
            --text-main: #ffffff;
            --text-sub: #8a8b91;
            --tiktok-cyan: #25F4EE;
            --tiktok-magenta: #FE2C55;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(135deg, rgba(37, 244, 238, 0.1) 0%, rgba(254, 44, 85, 0.1) 100%);
            position: relative;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: var(--tiktok-magenta);
            filter: drop-shadow(0 0 8px var(--tiktok-magenta));
        }

        .status {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--tiktok-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--tiktok-cyan);
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 70vh;
            overflow-y: auto;
        }

        .ranking-list::-webkit-scrollbar {
            width: 6px;
        }

        .ranking-list::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .user-card {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background-color 0.3s;
        }

        .user-card:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .rank {
            font-size: 18px;
            font-weight: 800;
            width: 32px;
            color: var(--text-sub);
        }

        .user-list-item:nth-child(1) .rank {
            color: var(--gold);
            font-size: 24px;
        }

        .user-list-item:nth-child(2) .rank {
            color: var(--silver);
            font-size: 20px;
        }

        .user-list-item:nth-child(3) .rank {
            color: var(--bronze);
            font-size: 20px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #333;
            margin-right: 16px;
            object-fit: cover;
            border: 2px solid transparent;
        }

        .user-list-item:nth-child(1) .avatar {
            border-color: var(--gold);
        }

        .user-list-item:nth-child(2) .avatar {
            border-color: var(--silver);
        }

        .user-list-item:nth-child(3) .avatar {
            border-color: var(--bronze);
        }

        .user-info {
            flex-grow: 1;
        }

        .user-name {
            font-size: 15px;
            font-weight: 700;
            margin: 0 0 2px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-id {
            font-size: 11px;
            color: var(--text-sub);
            margin: 0;
        }

        .tap-count {
            font-size: 19px;
            font-weight: 800;
            color: var(--tiktok-cyan);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tap-icon {
            color: var(--tiktok-magenta);
            font-size: 16px;
        }

        /* Modal Settings */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
        }

        .modal h2 {
            margin: 0 0 20px 0;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--tiktok-magenta);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--text-sub);
            border: none;
            font-size: 13px;
            cursor: pointer;
        }

        /* Animations */
        .update-flash {
            animation: flash 0.8s ease-out;
        }

        @keyframes flash {
            0% {
                background-color: rgba(254, 44, 85, 0.2);
            }

            100% {
                background-color: transparent;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <button class="settings-btn" id="open-settings">⚙ 設定</button>
            <h1><span>❤</span> Tap Ranking</h1>
            <div id="connection-status" class="status">
                <div class="pulse"></div>
                Initializing...
            </div>
        </div>
        <ul class="ranking-list" id="ranking-container">
            <!-- Ranking items will be injected here -->
        </ul>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>⚙ ツール設定</h2>
            <div class="form-group">
                <label>TikTok ユーザーID (@なし)</label>
                <input type="text" id="tiktok-id-input" placeholder="example_account">
            </div>
            <div class="form-group">
                <label>Google Sheets App Script URL (任意)</label>
                <input type="text" id="gs-url-input" placeholder="https://script.google.com/macros/s/...">
            </div>
            <button class="btn-primary" id="save-settings">設定を保存して再起動</button>
            <button class="btn-secondary" id="close-settings">キャンセル</button>
        </div>
    </div>

    <script>
        const socket = io();
        const container = document.getElementById('ranking-container');
        const statusEl = document.getElementById('connection-status');
        const modal = document.getElementById('modal-overlay');

        const tiktokInput = document.getElementById('tiktok-id-input');
        const gsInput = document.getElementById('gs-url-input');

        // 初期設定の取得
        fetch('/api/config')
            .then(res => res.json())
            .then(config => {
                tiktokInput.value = config.tiktokUsername;
                gsInput.value = config.googleSheetUrl;
            });

        socket.on('statusUpdate', (data) => {
            const color = data.connected ? 'var(--tiktok-cyan)' : 'var(--tiktok-magenta)';
            const pulse = `<div class="pulse" style="background-color: ${color}; box-shadow: 0 0 10px ${color}"></div>`;
            statusEl.innerHTML = `${pulse} ${data.msg}`;
        });

        let prevRanking = {};

        socket.on('rankingUpdate', (ranking) => {
            renderRanking(ranking);
        });

        function renderRanking(viewers) {
            container.innerHTML = '';

            viewers.forEach((viewer, index) => {
                const li = document.createElement('li');
                li.className = 'user-card user-list-item';
                li.id = `user-${viewer.id}`;

                // タップ数が増えた場合にフラッシュさせる
                if (prevRanking[viewer.id] && prevRanking[viewer.id] < viewer.taps) {
                    li.classList.add('update-flash');
                }

                li.innerHTML = `
                    <div class="rank">${index + 1}</div>
                    <img src="${viewer.avatar}" alt="avatar" class="avatar">
                    <div class="user-info">
                        <p class="user-name">${viewer.name}</p>
                        <p class="user-id">${viewer.id}</p>
                    </div>
                    <div class="tap-count">
                        <span class="tap-icon">❤</span> ${viewer.taps.toLocaleString()}
                    </div>
                `;
                container.appendChild(li);
                prevRanking[viewer.id] = viewer.taps;
            });
        }

        // Modal Controls
        document.getElementById('open-settings').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-settings').onclick = () => modal.style.display = 'none';

        document.getElementById('save-settings').onclick = async () => {
            const config = {
                tiktokUsername: tiktokInput.value.trim(),
                googleSheetUrl: gsInput.value.trim()
            };

            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });

            if (res.ok) {
                modal.style.display = 'none';
                alert('設定を保存しました。再接続を開始します。');
            }
        };
    </script>

</body>

</html>
