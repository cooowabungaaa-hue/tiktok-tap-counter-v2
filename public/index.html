<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live - Dashboard Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --card-bg: #18181b;
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --tiktok-cyan: #25F4EE;
            --tiktok-magenta: #FE2C55;
            --gold: #FFD700;
            --silver: #E2E2E2;
            --bronze: #CD7F32;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--tiktok-magenta);
            filter: drop-shadow(0 0 8px var(--tiktok-magenta));
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Layout Container */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left: Stream View */
        .stream-panel {
            flex: 1.2;
            border-right: 1px solid var(--glass-border);
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stream-placeholder {
            text-align: center;
            max-width: 400px;
            padding: 40px;
        }

        .stream-placeholder h2 {
            font-size: 24px;
            margin-bottom: 16px;
        }

        .stream-placeholder p {
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 24px;
        }

        /* Right: Ranking View */
        .ranking-panel {
            flex: 0.8;
            background-color: var(--card-bg);
            display: flex;
            flex-direction: column;
            min-width: 400px;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .user-card {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .rank {
            font-size: 16px;
            font-weight: 800;
            width: 32px;
            color: var(--text-sub);
        }

        .user-list-item:nth-child(1) .rank {
            color: var(--gold);
        }

        .user-list-item:nth-child(2) .rank {
            color: var(--silver);
        }

        .user-list-item:nth-child(3) .rank {
            color: var(--bronze);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #333;
            margin-right: 14px;
            object-fit: cover;
            border: 1.5px solid transparent;
        }

        .user-list-item:nth-child(1) .avatar {
            border-color: var(--gold);
        }

        .user-info {
            flex-grow: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
        }

        .user-id {
            font-size: 11px;
            color: var(--text-sub);
            margin: 0;
        }

        .tap-count {
            font-size: 18px;
            font-weight: 800;
            color: var(--tiktok-cyan);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tap-icon {
            color: var(--tiktok-magenta);
            font-size: 14px;
        }

        /* Buttons & Modals */
        .btn {
            background: var(--tiktok-magenta);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--glass-border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        /* Animations */
        .update-flash {
            animation: flash 0.8s ease-out;
        }

        @keyframes flash {
            0% {
                background: rgba(254, 44, 85, 0.15);
            }

            100% {
                background: transparent;
            }
        }

        /* Responsive */
        @media (max-width: 800px) {
            .main-layout {
                flex-direction: column;
            }

            .stream-panel {
                flex: 0.5;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }

            .ranking-panel {
                flex: 1;
                min-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="logo"><span>❤</span> Tap Dashboard</div>
        <div class="nav-actions">
            <div id="connection-status" class="status-badge">
                <div class="pulse"></div>
                Checking...
            </div>
            <button class="btn btn-outline" id="open-settings">⚙ 設定</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Dashboard: Left Panel (Stream) -->
        <div class="stream-panel">
            <div class="stream-placeholder" id="stream-info">
                <div id="monitor-content">
                    <h2>📺 Stream Monitor</h2>
                    <p id="monitor-status-text">設定ボタンからTikTok IDを入力してください。</p>
                    <div id="monitor-actions" style="display: none;">
                        <button class="btn" id="launch-stream" style="font-size: 18px; padding: 15px 30px;">
                            配信を別窓で開く
                        </button>
                        <p style="margin-top: 20px; font-size: 13px; color: var(--text-sub);">
                            ※TikTokの仕様上、この画面内への埋め込みは制限されています。<br>
                            別窓で開いた配信を、左側に配置してご利用ください。
                        </p>
                    </div>
                </div>
            </div>
            <!-- Hidden iframe for testing or future use -->
            <iframe id="stream-iframe" style="display: none; width: 100%; height: 100%; border: none;"></iframe>
        </div>

        <!-- Dashboard: Right Panel (Ranking) -->
        <div class="ranking-panel">
            <!-- ... existing ranking panel ... -->
            <div class="panel-header">
                <h3>🏆 Tap Ranking</h3>
                <span id="rank-count" style="font-size: 12px; color: var(--text-sub);">0 Viewers</span>
            </div>
            <ul class="ranking-list" id="ranking-container">
                <!-- Ranking items will be injected here -->
            </ul>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 style="margin-top: 0;">⚙ ツール設定</h2>
            <div class="form-group">
                <label>TikTok ユーザーID (@なし)</label>
                <input type="text" id="tiktok-id-input" placeholder="example_account">
            </div>
            <div class="form-group">
                <label>Google Sheets App Script URL (任意)</label>
                <input type="text" id="gs-url-input" placeholder="https://script.google.com/macros/s/...">
            </div>
            <button class="btn" id="save-settings" style="width: 100%;">設定を保存して再起動</button>
            <button class="btn btn-outline" id="close-settings"
                style="width: 100%; margin-top: 10px; border:none;">キャンセル</button>
        </div>
    </div>

    <script>
        const socket = io();
        const container = document.getElementById('ranking-container');
        const statusEl = document.getElementById('connection-status');
        const modal = document.getElementById('modal-overlay');
        const rankCountEl = document.getElementById('rank-count');

        const tiktokInput = document.getElementById('tiktok-id-input');
        const gsInput = document.getElementById('gs-url-input');

        const monitorStatusText = document.getElementById('monitor-status-text');
        const monitorActions = document.getElementById('monitor-actions');

        let currentTiktokId = '';

        // 初期設定の取得
        function updateConfig() {
            fetch('/api/config')
                .then(res => res.json())
                .then(config => {
                    tiktokInput.value = config.tiktokUsername;
                    gsInput.value = config.googleSheetUrl;
                    currentTiktokId = config.tiktokUsername;

                    if (currentTiktokId) {
                        monitorStatusText.innerHTML = `<span style="color:var(--tiktok-cyan)">@${currentTiktokId}</span> の配信準備ができました。`;
                        monitorActions.style.display = 'block';
                    }
                });
        }
        updateConfig();

        socket.on('statusUpdate', (data) => {
            const color = data.connected ? 'var(--tiktok-cyan)' : 'var(--tiktok-magenta)';
            const pulse = statusEl.querySelector('.pulse');
            pulse.style.backgroundColor = color;
            pulse.style.boxShadow = `0 0 10px ${color}`;
            statusEl.childNodes[2].textContent = data.msg;

            if (data.connected && currentTiktokId) {
                monitorStatusText.innerHTML = `<span style="color:var(--tiktok-cyan)">@${currentTiktokId}</span> に接続しました！`;
                monitorActions.style.display = 'block';
            }
        });

        let prevRanking = {};

        socket.on('rankingUpdate', (ranking) => {
            renderRanking(ranking);
            rankCountEl.textContent = `${ranking.length} Viewers Tracked`;
        });

        function renderRanking(viewers) {
            container.innerHTML = '';
            viewers.forEach((viewer, index) => {
                const li = document.createElement('li');
                li.className = 'user-card user-list-item';

                if (prevRanking[viewer.id] && prevRanking[viewer.id] < viewer.taps) {
                    li.classList.add('update-flash');
                }

                li.innerHTML = `
                    <div class="rank">${index + 1}</div>
                    <img src="${viewer.avatar}" alt="avatar" class="avatar">
                    <div class="user-info">
                        <p class="user-name">${viewer.name}</p>
                        <p class="user-id">${viewer.id}</p>
                    </div>
                    <div class="tap-count">
                        <span class="tap-icon">❤</span> ${viewer.taps.toLocaleString()}
                    </div>
                `;
                container.appendChild(li);
                prevRanking[viewer.id] = viewer.taps;
            });
        }

        // Action: Launch Stream
        document.getElementById('launch-stream').onclick = () => {
            if (!currentTiktokId) {
                alert('先に設定画面でTikTok IDを入力してください。');
                return;
            }
            const url = `https://www.tiktok.com/@${currentTiktokId}/live`;
            // 小窓で開く
            window.open(url, 'tiktok_live', 'width=1000,height=700');
        };

        // Modal Controls
        document.getElementById('open-settings').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-settings').onclick = () => modal.style.display = 'none';

        document.getElementById('save-settings').onclick = async () => {
            const config = {
                tiktokUsername: tiktokInput.value.trim().replace('@', ''),
                googleSheetUrl: gsInput.value.trim()
            };

            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });

            if (res.ok) {
                currentTiktokId = config.tiktokUsername;
                modal.style.display = 'none';
            }
        };
    </script>
</body>

</html>
